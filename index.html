<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyboard Layout Switcher</title>
    <link rel="stylesheet" href="src/index.css" />
  </head>
  <body class="bg-neutral-800 text-gray-100 min-h-screen">

    <div class="fixed bottom-0 left-4 z-50 rounded-lg p-4 max-w-xs">
      <div class="inline-flex rounded-lg border border-neutral-600 bg-neutral-800 overflow-hidden mb-3">
        <button
          id="mode-linux"
          class="px-6 py-2 text-sm font-medium transition-colors bg-neutral-600 text-white border-r border-neutral-600">
          Linux / Windows
        </button>
        <button
          id="mode-macos"
          class="px-6 py-2 text-sm font-medium transition-colors hover:bg-neutral-600 text-gray-300">
          macOS
        </button>
      </div>

      <p id="mode-explanation" class="text-xs text-gray-400 leading-relaxed">
        Commands will use <span class="text-blue-400 font-medium">Ctrl+C</span>, <span class="text-blue-400 font-medium">Ctrl+V</span>, <span class="text-blue-400 font-medium">Alt+Tab</span>, etc.
      </p>
    </div>

    <div class="flex items-center justify-center min-h-screen px-8">
      <div id="keyboard"></div>
    </div>

    <div class="absolute top-8   left-0 right-0 flex items-center justify-center">
      <h1 class="text-2xl font-bold font-sans">keyboard-ls</h1>
    </div>

    <div data-tauri-drag-region class="fixed top-0 left-0 right-40 h-12 z-40"></div>

    <div class="fixed top-0 right-0 z-50 flex items-center gap-1 p-2">
      <button
        id="titlebar-minimize"
        class="w-10 h-8 flex items-center justify-center hover:bg-neutral-700 rounded transition-colors"
        aria-label="Minimize">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 13H5v-2h14v2z"/>
        </svg>
      </button>

      <button
        id="titlebar-maximize"
        class="w-10 h-8 flex items-center justify-center hover:bg-neutral-700 rounded transition-colors"
        aria-label="Maximize">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M5 5h14v14H5V5zm2 2v10h10V7H7z"/>
        </svg>
      </button>

      <button
        id="titlebar-close"
        class="w-10 h-8 flex items-center justify-center hover:bg-red-600 rounded transition-colors"
        aria-label="Close">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
